version: "3.8"

services:
  backend:
    build:
      context: ./backend-platform
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    environment:
      - JWT_SECRET=bacopa-dev-secret
      - DB_PATH=/data/bacopa.db
    volumes:
      - bacopa-data:/data
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8080
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  bacopa-data:
